<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 405 100" width="405" height="100" role="img" aria-label="WebMelior logo — dark variant">
  <defs>
    <linearGradient id="wmLogoDarkGrad" x1="0.25" y1="0" x2="0.75" y2="1">
      <stop offset="0%" stop-color="#1A9A74"/>
      <stop offset="100%" stop-color="#0A4D3C"/>
    </linearGradient>
  </defs>

  <rect width="405" height="100" fill="#2C2C2A"/>

  <!-- Icon mark -->
  <path d="M 39,91 C 21,72 12,57 12,39 A 27,27 0 0 1 66,39 C 66,57 57,72 39,91 Z"
        fill="url(#wmLogoDarkGrad)"/>

  <!-- Single bold white upward chevron -->
  <polyline points="25,55 39,41 53,55"
            fill="none" stroke="#FFFFFF" stroke-width="5"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Wordmark — white / accent teal on dark -->
  <text x="84" y="52"
        font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-size="37" font-weight="700" letter-spacing="-1.5"
        fill="#FFFFFF">Web<tspan fill="#9FE1CB">Melior</tspan></text>

  <!-- Tagline -->
  <text x="86" y="73"
        font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-size="10.5" font-weight="500" letter-spacing="2.6"
        fill="#E1F5EE" opacity="0.7">YOUR LOCAL BUSINESS, UPGRADED.</text>
</svg>
