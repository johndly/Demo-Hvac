<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 90 110" width="90" height="110" role="img" aria-label="WebMelior icon">
  <defs>
    <linearGradient id="pinGrad" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#1A8A6C"/>
      <stop offset="100%" stop-color="#0A5C46"/>
    </linearGradient>
    <filter id="pinShadow" x="-30%" y="-20%" width="160%" height="160%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#0F6E56" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Pin body -->
  <g filter="url(#pinShadow)">
    <path d="M 45,105 C 18,82 10,63 10,44 A 35,35 0 0,0 45,9 A 35,35 0 0,0 80,44 C 80,63 72,82 45,105 Z"
          fill="url(#pinGrad)"/>
  </g>

  <!-- Inner window circle -->
  <circle cx="45" cy="43" r="22" fill="#E1F5EE"/>

  <!-- Lower chevron -->
  <polyline points="31,52 45,37 59,52"
            fill="none" stroke="#0F6E56" stroke-width="4"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Upper chevron -->
  <polyline points="33,43 45,28 57,43"
            fill="none" stroke="#9FE1CB" stroke-width="3"
            stroke-linecap="round" stroke-linejoin="round"/>
</svg>
